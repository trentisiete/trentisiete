<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="Terminal header with animation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </linearGradient>
    <style><![CDATA[
      text {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }
      .accent { fill: #FF6B35; }
      .muted { fill: #B8B8B8; }
      .highlight { fill: #FFD9CC; font-weight: 600; }
      .cmd { fill: #FFD9CC; font-size: 32px; }
      .cursor { stroke: #FFD9CC; stroke-width: 2; }
    ]]></style>
  </defs>

  <rect width="1200" height="300" rx="12" fill="url(#bg)"/>
  <rect x="32" y="24" width="1136" height="44" rx="9" fill="#000" fill-opacity="0.3"/>
  <circle cx="56" cy="46" r="6" fill="#FF5F56"/>
  <circle cx="80" cy="46" r="6" fill="#FFBD2E"/>
  <circle cx="104" cy="46" r="6" fill="#27C93F"/>

  <text x="42" y="117" class="accent" font-size="32" font-weight="700">&gt;</text>

  <!-- Spinner always visible + animated rotation -->
  <g transform="translate(76 104)">
    <circle cx="10" cy="10" r="8" fill="none" stroke="#FF6B35" stroke-opacity="0.25" stroke-width="3"/>
    <path d="M10 2 A8 8 0 0 1 17.2 7" fill="none" stroke="#FF6B35" stroke-width="3" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 10 10" to="360 10 10" dur="1s" repeatCount="indefinite"/>
    </path>
  </g>

  <text x="116" y="117" class="cmd">whoami</text>
  <line x1="212" y1="92" x2="212" y2="118" class="cursor">
    <animate attributeName="opacity" values="1;1;0;0;1" dur="0.9s" repeatCount="indefinite"/>
  </line>

  <!-- Content is visible by default so it still shows even if animations are disabled -->
  <text x="52" y="158" class="accent" font-size="20">⏺</text>
  <text x="76" y="158" class="muted" font-size="24"><tspan class="highlight">José Arbeláez</tspan> – Data Science &amp; Engineering</text>

  <text x="52" y="198" class="accent" font-size="20">⏺</text>
  <text x="76" y="198" class="muted" font-size="24">Building • Shipping AI Agents workflows</text>

  <text x="52" y="238" class="accent" font-size="20">⏺</text>
  <text x="76" y="238" class="muted" font-size="24">Watch:</text>
  <a href="https://www.josearbelaez.com/es/" target="_blank">
    <text x="176" y="238" class="highlight" font-size="24">https://www.josearbelaez.com/es/</text>
  </a>
</svg>
