<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="Animated terminal header">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </linearGradient>
    <clipPath id="cmdReveal">
      <rect x="116" y="96" width="0" height="30">
        <animate attributeName="width" from="0" to="92" begin="0.25s" dur="0.9s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="line2Reveal">
      <rect x="76" y="195" width="0" height="30">
        <animate attributeName="width" from="0" to="430" begin="2.2s" dur="1.6s" fill="freeze"/>
      </rect>
    </clipPath>
    <style><![CDATA[
      text {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }
      .accent { fill: #FF6B35; }
      .muted { fill: #B8B8B8; }
      .highlight { fill: #FFD9CC; font-weight: 600; }
      .cmd { fill: #FFD9CC; font-size: 32px; }
      .hidden { opacity: 0; }
      .cursor {
        stroke: #FFD9CC;
        stroke-width: 2;
        animation: blink .85s step-end infinite;
      }
      @keyframes blink {
        50% { opacity: 0; }
      }
    ]]></style>
  </defs>

  <rect width="1200" height="300" rx="12" fill="url(#bg)"/>
  <rect x="32" y="24" width="1136" height="44" rx="9" fill="#000" fill-opacity="0.3"/>
  <circle cx="56" cy="46" r="6" fill="#FF5F56"/>
  <circle cx="80" cy="46" r="6" fill="#FFBD2E"/>
  <circle cx="104" cy="46" r="6" fill="#27C93F"/>

  <text x="42" y="117" class="accent" font-size="32" font-weight="700">&gt;</text>

  <text x="77" y="117" class="accent" font-size="28">⣾
    <set attributeName="opacity" to="1" begin="0s;spin8.end" dur="0.15s" id="spin1"/>
    <set attributeName="opacity" to="0" begin="spin2.begin" dur="0.001s"/>
  </text>
  <text x="77" y="117" class="accent" font-size="28" opacity="0">⣽<set attributeName="opacity" to="1" begin="spin1.begin+0.15s" dur="0.15s" id="spin2"/><set attributeName="opacity" to="0" begin="spin3.begin" dur="0.001s"/></text>
  <text x="77" y="117" class="accent" font-size="28" opacity="0">⣻<set attributeName="opacity" to="1" begin="spin2.begin+0.15s" dur="0.15s" id="spin3"/><set attributeName="opacity" to="0" begin="spin4.begin" dur="0.001s"/></text>
  <text x="77" y="117" class="accent" font-size="28" opacity="0">⢿<set attributeName="opacity" to="1" begin="spin3.begin+0.15s" dur="0.15s" id="spin4"/><set attributeName="opacity" to="0" begin="spin5.begin" dur="0.001s"/></text>
  <text x="77" y="117" class="accent" font-size="28" opacity="0">⡿<set attributeName="opacity" to="1" begin="spin4.begin+0.15s" dur="0.15s" id="spin5"/><set attributeName="opacity" to="0" begin="spin6.begin" dur="0.001s"/></text>
  <text x="77" y="117" class="accent" font-size="28" opacity="0">⣟<set attributeName="opacity" to="1" begin="spin5.begin+0.15s" dur="0.15s" id="spin6"/><set attributeName="opacity" to="0" begin="spin7.begin" dur="0.001s"/></text>
  <text x="77" y="117" class="accent" font-size="28" opacity="0">⣯<set attributeName="opacity" to="1" begin="spin6.begin+0.15s" dur="0.15s" id="spin7"/><set attributeName="opacity" to="0" begin="spin8.begin" dur="0.001s"/></text>
  <text x="77" y="117" class="accent" font-size="28" opacity="0">⣷<set attributeName="opacity" to="1" begin="spin7.begin+0.15s" dur="0.15s" id="spin8"/><set attributeName="opacity" to="0" begin="4.15s" dur="0.001s"/></text>
  <text x="77" y="117" class="accent" font-size="28" opacity="0">✓<set attributeName="opacity" to="1" begin="4.15s" fill="freeze"/></text>

  <text x="116" y="117" class="cmd" clip-path="url(#cmdReveal)">whoami</text>
  <line x1="210" y1="92" x2="210" y2="118" class="cursor">
    <set attributeName="opacity" to="0" begin="1.2s" fill="freeze"/>
  </line>

  <g opacity="0">
    <set attributeName="opacity" to="1" begin="1.3s" fill="freeze"/>
    <text x="52" y="158" class="accent" font-size="20">⏺</text>
    <text x="76" y="158" class="muted" font-size="24"><tspan class="highlight">José Arbeláez</tspan> – Data Science &amp; Engineering</text>
  </g>

  <g opacity="0">
    <set attributeName="opacity" to="1" begin="2.1s" fill="freeze"/>
    <text x="52" y="198" class="accent" font-size="20">⏺</text>
    <text x="76" y="198" class="muted" font-size="24" clip-path="url(#line2Reveal)">Building • Shipping AI Agents workflows</text>
    <line x1="506" y1="174" x2="506" y2="200" class="cursor">
      <set attributeName="opacity" to="0" begin="3.9s" fill="freeze"/>
    </line>
  </g>

  <g opacity="0">
    <set attributeName="opacity" to="1" begin="4s" fill="freeze"/>
    <text x="52" y="238" class="accent" font-size="20">⏺</text>
    <text x="76" y="238" class="muted" font-size="24">Watch:</text>
    <a href="https://www.josearbelaez.com/es/" target="_blank">
      <text x="176" y="238" class="highlight" font-size="24">https://www.josearbelaez.com/es/</text>
    </a>
  </g>
</svg>
