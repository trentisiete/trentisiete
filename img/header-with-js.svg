<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="240" viewBox="0 0 800 240" role="img" aria-label="Terminal header with animation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </linearGradient>
    <style><![CDATA[
      text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .cmd { fill: #FFD9CC; font-size: 20px; }
      .muted { fill: #B8B8B8; font-size: 16px; }
      .accent { fill: #FF6B35; }
      .highlight { fill: #FFD9CC; font-weight: 600; }

      .spinner-frame {
        opacity: 0;
        animation: spinframes 1s steps(1,end) infinite;
      }
      .f1 { animation-delay: 0s; }
      .f2 { animation-delay: .125s; }
      .f3 { animation-delay: .25s; }
      .f4 { animation-delay: .375s; }
      .f5 { animation-delay: .5s; }
      .f6 { animation-delay: .625s; }
      .f7 { animation-delay: .75s; }
      .f8 { animation-delay: .875s; }

      .cursor {
        stroke: #FFD9CC;
        stroke-width: 2;
        animation: blink .9s step-end infinite;
      }

      @keyframes spinframes {
        0%, 12% { opacity: 1; }
        13%, 100% { opacity: 0; }
      }
      @keyframes blink {
        50% { opacity: 0; }
      }
    ]]></style>
  </defs>

  <rect x="0" y="0" width="800" height="240" rx="10" fill="url(#bg)"/>
  <rect x="30" y="20" width="740" height="40" rx="8" fill="#000" fill-opacity="0.30"/>
  <circle cx="50" cy="40" r="6" fill="#FF5F56"/>
  <circle cx="74" cy="40" r="6" fill="#FFBD2E"/>
  <circle cx="98" cy="40" r="6" fill="#27C93F"/>

  <text x="30" y="98" class="accent" font-size="20" font-weight="700">&gt;</text>

  <text x="52" y="98" class="accent spinner-frame f1" font-size="18">⣾</text>
  <text x="52" y="98" class="accent spinner-frame f2" font-size="18">⣽</text>
  <text x="52" y="98" class="accent spinner-frame f3" font-size="18">⣻</text>
  <text x="52" y="98" class="accent spinner-frame f4" font-size="18">⢿</text>
  <text x="52" y="98" class="accent spinner-frame f5" font-size="18">⡿</text>
  <text x="52" y="98" class="accent spinner-frame f6" font-size="18">⣟</text>
  <text x="52" y="98" class="accent spinner-frame f7" font-size="18">⣯</text>
  <text x="52" y="98" class="accent spinner-frame f8" font-size="18">⣷</text>

  <text x="76" y="98" class="cmd">whoami</text>
  <line x1="142" y1="82" x2="142" y2="100" class="cursor"/>

  <text x="30" y="138" class="accent" font-size="16">⏺</text>
  <text x="54" y="138" class="highlight" font-size="18">José Arbeláez</text>
  <text x="54" y="156" class="muted" font-size="14">Data Science &amp; Engineering</text>

  <text x="30" y="168" class="accent" font-size="16">⏺</text>
  <text x="54" y="168" class="muted">Building • Shipping AI Agents workflows</text>

  <text x="30" y="198" class="accent" font-size="16">⏺</text>
  <text x="54" y="198" class="muted">Watch:</text>
  <a href="https://www.josearbelaez.com/es/" target="_blank">
    <text x="122" y="198" class="highlight" font-size="16">https://www.josearbelaez.com/es/</text>
  </a>
</svg>
