<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="240" viewBox="0 0 800 240" role="img" aria-label="Terminal header">
  <foreignObject x="0" y="0" width="800" height="240">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:800px;height:240px;">
      <style>
        .container{
          width:800px;height:240px;
          background: linear-gradient(135deg,#1a1a1a,#2d2d2d);
          border-radius:10px;
          padding:20px 30px;
          box-sizing:border-box;
          font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
        }
        .terminal-header{
          height:40px;border-radius:8px;
          background: rgba(0,0,0,0.3);
          display:flex;align-items:center;gap:12px;
          padding:0 14px; box-sizing:border-box;
        }
        .circle{ width:12px;height:12px;border-radius:50%; }
        .red{background:#FF5F56}.yellow{background:#FFBD2E}.green{background:#27C93F}

        .command-line{ margin-top:26px; display:flex; align-items:flex-start; gap:10px; }
        .arrow{ color:#FF6B35; font-weight:700; font-size:20px; line-height:1; }
        .spinner{
          color:#FF6B35; font-size:18px; line-height:1;
          width:1ch; display:inline-block;
        }
        /* FIX: animate content on pseudo-element, not on the element itself */
        .spinner::before{
          content:"⣾";
          animation: spinner 1.2s linear infinite;
          display:inline-block;
        }
        @keyframes spinner{
          0%{content:"⣾";}
          12.5%{content:"⣽";}
          25%{content:"⣻";}
          37.5%{content:"⢿";}
          50%{content:"⡿";}
          62.5%{content:"⣟";}
          75%{content:"⣯";}
          87.5%{content:"⣷";}
          100%{content:"⣷";}
        }

        .command{
          color:#FFD9CC;
          overflow:hidden;
          border-right:2px solid #FFD9CC;
          white-space:nowrap;
          width:0;
          animation:
            typing 1s steps(6) 0.3s forwards,
            blink 0.75s step-end 0s 2,
            hideCursor 0s 1.5s forwards;
          font-size:20px; line-height:1;
        }
        @keyframes typing{ from{width:0;} to{width:5.5em;} }
        @keyframes blink{ 50%{border-color:transparent;} }
        @keyframes hideCursor{ to{border-color:transparent;} }

        .output{ margin-top:20px; display:flex; flex-direction:column; gap:8px; font-size:16px; }
        .line{ display:flex; gap:10px; align-items:flex-start; opacity:0; }
        .line:nth-child(1){ animation: fadeInUp 0.5s ease-out 1.3s forwards; }
        .line:nth-child(2){ animation: fadeInUp 0.5s ease-out 1.8s forwards; }
        .line:nth-child(3){ animation: fadeInUp 0.5s ease-out 4.5s forwards; }

        .bullet{ color:#FF6B35; flex-shrink:0; line-height:1.6; }
        .text{ color:#B8B8B8; line-height:1.6; }
        .highlight{ color:#FFD9CC; font-weight:500; }

        .typing-line{
          overflow:hidden; white-space:nowrap; width:0;
          animation: typeLine 2.5s steps(50) 2.0s forwards;
        }
        @keyframes typeLine{ to{width:100%;} }

        a{ color:#FFD9CC; text-decoration:none; }
        a:hover{ text-decoration:underline; }

        @keyframes fadeInUp{
          from{ opacity:0; transform:translateY(10px); }
          to{ opacity:1; transform:translateY(0); }
        }
      </style>

      <div class="container">
        <div class="terminal-header">
          <div class="circle red"></div>
          <div class="circle yellow"></div>
          <div class="circle green"></div>
        </div>

        <div class="command-line">
          <span class="arrow">&gt;</span>
          <span class="spinner"></span>
          <span class="command">whoami</span>
        </div>

        <div class="output">
          <div class="line">
            <span class="bullet">⏺</span>
            <span class="text">
              <span class="highlight">José Arbeláez</span> – Data Science & Engineering
            </span>
          </div>

          <div class="line">
            <span class="bullet">⏺</span>
            <span class="text typing-line">Building • Shipping AI Agents workflows</span>
          </div>

          <div class="line">
            <span class="bullet">⏺</span>
            <span class="text">
              Watch: <a href="josearbelaez.com" target="_blank" class="highlight">https://www.josearbelaez.com/es/</a>
            </span>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
