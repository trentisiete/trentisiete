<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="800"
  height="240"
  viewBox="0 0 800 240"
  role="img"
  aria-label="Terminal header"
>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#2d2d2d"/>
    </linearGradient>

    <style><![CDATA[
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }
      .fadeIn { opacity: 0; animation: fadeIn 0.3s ease-out forwards; }
      .line { opacity: 0; animation: fadeInUp 0.5s ease-out forwards; }
      .line1 { animation-delay: 1.3s; }
      .line2 { animation-delay: 1.8s; }
      .line3 { animation-delay: 4.5s; }

      @keyframes fadeIn { to { opacity: 1; } }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes spinnerFrames {
        0% { opacity: 1; }
        12.5% { opacity: 1; }
        12.51% { opacity: 0; }
        100% { opacity: 0; }
      }
      @keyframes spinnerDone { from { opacity: 0; } to { opacity: 1; } }

      .cursorBlink { animation: cursorBlink 0.75s step-end 0s 2; }
      @keyframes cursorBlink { 50% { opacity: 0; } }

      .cursorHide { animation: cursorHide 0s linear 1.5s forwards; }
      @keyframes cursorHide { to { opacity: 0; } }
    ]]></style>

    <clipPath id="cardClip">
      <rect x="0" y="0" width="800" height="240" rx="10" ry="10"/>
    </clipPath>

    <!-- Clip paths used by animations -->
    <clipPath id="cmdClip">
      <!-- Animated width for "whoami" reveal -->
      <rect x="0" y="0" width="0" height="28">
        <animate attributeName="width" from="0" to="72" dur="1s" begin="0.3s" fill="freeze"/>
      </rect>
    </clipPath>

    <clipPath id="typeLineClip">
      <!-- Animated width for second line typing -->
      <rect x="24" y="0" width="0" height="22">
        <animate attributeName="width" from="0" to="600" dur="2.5s" begin="2.0s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <g clip-path="url(#cardClip)">
    <rect x="0" y="0" width="800" height="240" fill="url(#bg)"/>

    <g transform="translate(30,20)">
      <!-- Terminal header -->
      <rect x="0" y="0" width="740" height="40" rx="8" ry="8" fill="rgba(0,0,0,0.3)"/>
      <circle cx="20" cy="20" r="6" fill="#FF5F56"/>
      <circle cx="38" cy="20" r="6" fill="#FFBD2E"/>
      <circle cx="56" cy="20" r="6" fill="#27C93F"/>

      <!-- Command line -->
      <g class="fadeIn mono" transform="translate(0,72)">
        <text x="0" y="0" font-size="20" fill="#FF6B35" font-weight="700" dominant-baseline="text-before-edge">&gt;</text>

        <!-- Spinner -->
        <g transform="translate(24,0)">
          <text class="mono" x="0" y="0" font-size="18" fill="#FF6B35" dominant-baseline="text-before-edge"
                style="animation: spinnerFrames 1.2s linear infinite;">⣾</text>
          <text class="mono" x="0" y="0" font-size="18" fill="#FF6B35" dominant-baseline="text-before-edge"
                style="opacity:0; animation: spinnerFrames 1.2s linear infinite; animation-delay: 0.15s;">⣽</text>
          <text class="mono" x="0" y="0" font-size="18" fill="#FF6B35" dominant-baseline="text-before-edge"
                style="opacity:0; animation: spinnerFrames 1.2s linear infinite; animation-delay: 0.30s;">⣻</text>
          <text class="mono" x="0" y="0" font-size="18" fill="#FF6B35" dominant-baseline="text-before-edge"
                style="opacity:0; animation: spinnerFrames 1.2s linear infinite; animation-delay: 0.45s;">⢿</text>
          <text class="mono" x="0" y="0" font-size="18" fill="#FF6B35" dominant-baseline="text-before-edge"
                style="opacity:0; animation: spinnerFrames 1.2s linear infinite; animation-delay: 0.60s;">⡿</text>
          <text class="mono" x="0" y="0" font-size="18" fill="#FF6B35" dominant-baseline="text-before-edge"
                style="opacity:0; animation: spinnerFrames 1.2s linear infinite; animation-delay: 0.75s;">⣟</text>
          <text class="mono" x="0" y="0" font-size="18" fill="#FF6B35" dominant-baseline="text-before-edge"
                style="opacity:0; animation: spinnerFrames 1.2s linear infinite; animation-delay: 0.90s;">⣯</text>
          <text class="mono" x="0" y="0" font-size="18" fill="#FF6B35" dominant-baseline="text-before-edge"
                style="opacity:0; animation: spinnerFrames 1.2s linear infinite; animation-delay: 1.05s;">⣷</text>

          <!-- Done check -->
        </g>

        <!-- Typed 'whoami' -->
        <g transform="translate(48,0)">
          <g clip-path="url(#cmdClip)">
            <text class="mono" x="0" y="0" font-size="20" fill="#FFD9CC" dominant-baseline="text-before-edge">whoami</text>
          </g>

          <text class="mono cursorBlink cursorHide" x="72" y="0" font-size="20" fill="#FFD9CC" dominant-baseline="text-before-edge">▌</text>
        </g>
      </g>

      <!-- Output (fixed spacing, no overlap) -->
      <g class="mono" transform="translate(0,118)" font-size="16">
        <!-- Line 1 -->
        <g class="line line1">
          <text x="0" y="0" fill="#FF6B35" dominant-baseline="text-before-edge">⏺</text>
          <text x="24" y="0" fill="#B8B8B8" dominant-baseline="text-before-edge">
            <tspan fill="#FFD9CC" font-weight="600">José Arbeláez</tspan>
            <tspan> – Data Science &amp; Engineering</tspan>
          </text>
        </g>

        <!-- Line 2 (typewriter reveal) -->
        <g class="line line2" transform="translate(0,28)">
          <text x="0" y="0" fill="#FF6B35" dominant-baseline="text-before-edge">⏺</text>
          <g clip-path="url(#typeLineClip)">
            <text x="24" y="30" fill="#B8B8B8" dominant-baseline="text-before-edge">
              Building • Demoing • Shipping AI agent systems
            </text>
          </g>
        </g>

        <!-- Line 3 -->
        <g class="line line3" transform="translate(0,56)">
          <text x="0" y="0" fill="#FF6B35" dominant-baseline="text-before-edge">⏺</text>
          <text x="24" y="60" fill="#B8B8B8" dominant-baseline="text-before-edge">
            <tspan>Watch: </tspan>
            <tspan fill="#FFD9CC" font-weight="600">josearbelaez.com</tspan>
          </text>
        </g>
      </g>
    </g>
  </g>
</svg>
